<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>⭐ Star Detector</title>

<script async src="https://docs.opencv.org/4.x/opencv.js"></script>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

h2{
    margin-top:20px;
}

button{
    padding:14px 22px;
    margin:10px;
    font-size:16px;
}

#container{
    position:relative;
    display:inline-block;
    width:95vw;
}

video{
    width:100%;
    border:3px solid #444;
}

canvas{
    position:absolute;
    left:0;
    top:0;
}

#status{
    font-size:18px;
    margin-top:10px;
}

#stats{
    color:#aaa;
    font-size:14px;
}

</style>
</head>

<body>

<h2>⭐ Star Detector</h2>

<button onclick="startCamera()">Start Camera</button>
<button onclick="startDetection()">Start Detection</button>

<div id="status">Status: Idle</div>
<div id="stats">Frames scanned: 0 | Match score: 0</div>

<div id="container">
    <video id="video" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
</div>

<canvas id="frameCanvas" style="display:none;"></canvas>

<script>

let templateImg
let roi = null
let drawing = false
let startX,startY

let frameCount = 0

const video = document.getElementById("video")
const canvas = document.getElementById("overlay")
const ctx = canvas.getContext("2d")

const frameCanvas = document.getElementById("frameCanvas")
const frameCtx = frameCanvas.getContext("2d")

const statusDiv = document.getElementById("status")
const statsDiv = document.getElementById("stats")

// START CAMERA

async function startCamera(){

    const stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:"environment"}
    })

    video.srcObject = stream

    video.onloadedmetadata = ()=>{

        canvas.width = video.videoWidth
        canvas.height = video.videoHeight

        frameCanvas.width = video.videoWidth
        frameCanvas.height = video.videoHeight

    }

}

// DRAW BOX (MOUSE)

canvas.addEventListener("mousedown", startDraw)
canvas.addEventListener("mousemove", drawBox)
canvas.addEventListener("mouseup", endDraw)

// DRAW BOX (TOUCH)

canvas.addEventListener("touchstart", startTouch)
canvas.addEventListener("touchmove", moveTouch)
canvas.addEventListener("touchend", endTouch)

function startDraw(e){

    drawing = true
    startX = e.offsetX
    startY = e.offsetY

}

function drawBox(e){

    if(!drawing) return

    ctx.clearRect(0,0,canvas.width,canvas.height)

    const w = e.offsetX - startX
    const h = e.offsetY - startY

    ctx.strokeStyle = "yellow"
    ctx.lineWidth = 3

    ctx.strokeRect(startX,startY,w,h)

}

function endDraw(e){

    drawing = false

    roi = {
        x:startX,
        y:startY,
        w:e.offsetX-startX,
        h:e.offsetY-startY
    }

}

// TOUCH EVENTS

function startTouch(e){

    e.preventDefault()

    const rect = canvas.getBoundingClientRect()
    const touch = e.touches[0]

    startX = touch.clientX - rect.left
    startY = touch.clientY - rect.top

    drawing = true

}

function moveTouch(e){

    if(!drawing) return

    e.preventDefault()

    const rect = canvas.getBoundingClientRect()
    const touch = e.touches[0]

    const x = touch.clientX - rect.left
    const y = touch.clientY - rect.top

    ctx.clearRect(0,0,canvas.width,canvas.height)

    ctx.strokeStyle="yellow"
    ctx.lineWidth=3

    ctx.strokeRect(startX,startY,x-startX,y-startY)

}

function endTouch(e){

    drawing = false

    const rect = canvas.getBoundingClientRect()
    const touch = e.changedTouches[0]

    const x = touch.clientX - rect.left
    const y = touch.clientY - rect.top

    roi = {
        x:startX,
        y:startY,
        w:x-startX,
        h:y-startY
    }

}

// START DETECTION

function startDetection(){

    templateImg = new Image()

    templateImg.onload = ()=>{

        statusDiv.innerText = "Status: Detection Running"

        detectLoop()

    }

    templateImg.src = "star.png"

}

// DETECTION LOOP

function detectLoop(){

    setInterval(()=>{

        frameCtx.drawImage(video,0,0,frameCanvas.width,frameCanvas.height)

        let src = cv.imread(frameCanvas)
        let gray = new cv.Mat()

        cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY)

        if(!roi){

            src.delete()
            gray.delete()
            return

        }

        const tpl = cv.imread(templateImg)
        cv.cvtColor(tpl,tpl,cv.COLOR_RGBA2GRAY)

        const roiMat = gray.roi(new cv.Rect(
            roi.x,
            roi.y,
            roi.w,
            roi.h
        ))

        const result = new cv.Mat()

        cv.matchTemplate(roiMat,tpl,result,cv.TM_CCOEFF_NORMED)

        const {maxVal,maxLoc} = cv.minMaxLoc(result)

        frameCount++

        statsDiv.innerText =
            "Frames scanned: " + frameCount +
            " | Match score: " + maxVal.toFixed(3)

        if(maxVal > 0.72){

            ctx.strokeStyle="lime"
            ctx.lineWidth=4

            ctx.strokeRect(
                roi.x + maxLoc.x,
                roi.y + maxLoc.y,
                tpl.cols,
                tpl.rows
            )

            alertSound()

        }

        src.delete()
        gray.delete()
        tpl.delete()
        roiMat.delete()
        result.delete()

    },100)

}

// ALERT

function alertSound(){

    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")
    audio.play()

}

</script>

</body>
</html>
