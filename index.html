<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>⭐ Star Detector</title>

    <script async src="https://docs.opencv.org/4.x/opencv.js"></script>

    <style>
      body {
        background: #111;
        color: white;
        font-family: Arial;
        text-align: center;
      }

      button {
        padding: 14px 20px;
        margin: 8px;
        font-size: 16px;
      }

      #container {
        position: relative;
        display: inline-block;
        width: 95vw;
      }

      video {
        width: 100%;
        border: 3px solid #444;
      }

      canvas {
        position: absolute;
        top: 0;
        left: 0;
      }

      #status {
        font-size: 18px;
        margin-top: 10px;
      }

      #stats {
        color: #aaa;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <h2>⭐ Star Detector</h2>

    <button onclick="startCamera()">Start Camera</button>
    <button onclick="startDetection()">Start Detection</button>
    <button onclick="resetDetections()">Reset Detections</button>

    <br />

    Threshold:
    <input
      id="thresholdSlider"
      type="range"
      min="0.55"
      max="0.95"
      step="0.01"
      value="0.72"
    />
    <span id="thresholdValue">0.72</span>

    <div id="status">Status: Idle</div>
    <div id="stats">Frames scanned: 0 | Match score: 0</div>

    <div id="container">
      <video id="video" autoplay playsinline></video>
      <canvas id="overlay"></canvas>
    </div>

    <canvas id="frameCanvas" style="display: none"></canvas>

    <script>
      let roi = null;
      let drawing = false;
      let startX, startY;

      let frameCount = 0;
      let threshold = 0.72;

      let detections = [];
      let detectionLocked = false;

      let tplMat = null;

      const video = document.getElementById("video");
      const canvas = document.getElementById("overlay");
      const ctx = canvas.getContext("2d");

      const frameCanvas = document.getElementById("frameCanvas");
      const frameCtx = frameCanvas.getContext("2d");

      const statusDiv = document.getElementById("status");
      const statsDiv = document.getElementById("stats");

      const slider = document.getElementById("thresholdSlider");
      const sliderValue = document.getElementById("thresholdValue");

      slider.oninput = () => {
        threshold = parseFloat(slider.value);
        sliderValue.innerText = threshold.toFixed(2);
      };

      async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
        });

        video.srcObject = stream;

        video.onloadedmetadata = () => {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;

          frameCanvas.width = video.videoWidth;
          frameCanvas.height = video.videoHeight;
        };
      }

      canvas.addEventListener("mousedown", startDraw);
      canvas.addEventListener("mousemove", drawBox);
      canvas.addEventListener("mouseup", endDraw);

      canvas.addEventListener("touchstart", startTouch);
      canvas.addEventListener("touchmove", moveTouch);
      canvas.addEventListener("touchend", endTouch);

      function startDraw(e) {
        drawing = true;
        startX = e.offsetX;
        startY = e.offsetY;
      }

      function drawBox(e) {
        if (!drawing) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = "yellow";
        ctx.lineWidth = 3;
        ctx.strokeRect(startX, startY, e.offsetX - startX, e.offsetY - startY);
      }

      function endDraw(e) {
        drawing = false;

        roi = {
          x: startX,
          y: startY,
          w: e.offsetX - startX,
          h: e.offsetY - startY,
        };
      }

      function startTouch(e) {
        e.preventDefault();

        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];

        startX = touch.clientX - rect.left;
        startY = touch.clientY - rect.top;

        drawing = true;
      }

      function moveTouch(e) {
        if (!drawing) return;

        e.preventDefault();

        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];

        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = "yellow";
        ctx.lineWidth = 3;
        ctx.strokeRect(startX, startY, x - startX, y - startY);
      }

      function endTouch(e) {
        drawing = false;

        const rect = canvas.getBoundingClientRect();
        const touch = e.changedTouches[0];

        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;

        roi = {
          x: startX,
          y: startY,
          w: x - startX,
          h: y - startY,
        };
      }

      function startDetection() {
        statusDiv.innerText = "Status: Loading Template";

        const img = new Image();

        img.onload = () => {
          let tmp = cv.imread(img);
          tplMat = new cv.Mat();

          cv.cvtColor(tmp, tplMat, cv.COLOR_RGBA2GRAY);

          tmp.delete();

          statusDiv.innerText = "Status: Detection Running";

          detectLoop();
        };

        img.src = "star.png";
      }

      function detectLoop() {
        setInterval(() => {
          try {
            frameCtx.drawImage(
              video,
              0,
              0,
              frameCanvas.width,
              frameCanvas.height,
            );

            let src = cv.imread(frameCanvas);
            let gray = new cv.Mat();

            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

            cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0);

            if (!roi) {
              src.delete();
              gray.delete();
              return;
            }

            let roiMat = gray.roi(new cv.Rect(roi.x, roi.y, roi.w, roi.h));

            let result = new cv.Mat();

            cv.matchTemplate(roiMat, tplMat, result, cv.TM_CCOEFF_NORMED);

            const { maxVal, maxLoc } = cv.minMaxLoc(result);

            frameCount++;

            statsDiv.innerText =
              "Frames scanned: " +
              frameCount +
              " | Match score: " +
              maxVal.toFixed(3);

            if (maxVal > threshold && !detectionLocked) {
              detections.push({
                x: roi.x + maxLoc.x,
                y: roi.y + maxLoc.y,
                w: tplMat.cols,
                h: tplMat.rows,
              });

              detectionLocked = true;

              alertUser();
            }

            detections.forEach((d) => {
              ctx.strokeStyle = "lime";
              ctx.lineWidth = 4;
              ctx.strokeRect(d.x, d.y, d.w, d.h);
            });

            src.delete();
            gray.delete();
            roiMat.delete();
            result.delete();
          } catch (err) {
            console.log(err);
          }
        }, 120);
      }

      function alertUser() {
        const audio = new Audio(
          "https://actions.google.com/sounds/v1/alarms/beep_short.ogg",
        );
        audio.play().catch(() => {});

        if (navigator.vibrate) {
          navigator.vibrate([300, 200, 300]);
        }
      }

      function resetDetections() {
        detections = [];
        detectionLocked = false;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (roi) {
          ctx.strokeStyle = "yellow";
          ctx.lineWidth = 3;
          ctx.strokeRect(roi.x, roi.y, roi.w, roi.h);
        }
      }
    </script>
  </body>
</html>
