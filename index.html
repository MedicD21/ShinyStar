<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>⭐ Star Detector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;600;700&family=Bangers&display=swap"
      rel="stylesheet"
    />

    <script async src="https://docs.opencv.org/4.x/opencv.js"></script>

    <style>
      :root {
        --char-orange: #ff8a22;
        --char-orange-deep: #f25c18;
        --char-cream: #ffe2bf;
        --char-smoke: #25150f;
        --char-ash: #120905;
        --char-red: #ff3f1a;
        --char-yellow: #ffd15f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background:
          radial-gradient(circle at 12% 18%, rgba(255, 132, 32, 0.34), transparent 34%),
          radial-gradient(circle at 82% 8%, rgba(255, 96, 26, 0.28), transparent 30%),
          linear-gradient(160deg, #170904 0%, #2d1204 48%, #120703 100%);
        color: var(--char-cream);
        font-family: "Barlow Semi Condensed", "Trebuchet MS", sans-serif;
        margin: 0;
        min-height: 100vh;
        padding: 22px 14px 30px;
        position: relative;
      }

      body::before {
        background-image: repeating-linear-gradient(
          -35deg,
          rgba(255, 255, 255, 0.02) 0 6px,
          transparent 6px 18px
        );
        content: "";
        inset: 0;
        pointer-events: none;
        position: fixed;
        z-index: 0;
      }

      .bg-orb {
        animation: emberDrift 10s ease-in-out infinite;
        filter: blur(60px);
        opacity: 0.4;
        pointer-events: none;
        position: fixed;
        z-index: 0;
      }

      .bg-orb--left {
        background: rgba(255, 120, 22, 0.9);
        border-radius: 50%;
        height: 280px;
        left: -90px;
        top: 40px;
        width: 280px;
      }

      .bg-orb--right {
        animation-duration: 13s;
        background: rgba(255, 58, 22, 0.8);
        border-radius: 50%;
        bottom: -120px;
        height: 320px;
        right: -90px;
        width: 320px;
      }

      .app-shell {
        margin: 0 auto;
        max-width: 1060px;
        position: relative;
        width: 100%;
        z-index: 1;
      }

      .hero {
        text-align: center;
      }

      .badge {
        background: rgba(255, 130, 40, 0.18);
        border: 1px solid rgba(255, 178, 96, 0.5);
        border-radius: 999px;
        display: inline-block;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        margin: 0 0 8px;
        padding: 6px 14px;
        text-transform: uppercase;
      }

      h1 {
        color: var(--char-yellow);
        font-family: "Bangers", "Impact", fantasy;
        font-size: clamp(2.2rem, 5vw, 3.6rem);
        letter-spacing: 0.06em;
        margin: 0;
        text-shadow:
          0 2px 0 rgba(92, 25, 0, 0.9),
          0 10px 28px rgba(255, 85, 24, 0.45);
      }

      .spark {
        animation: flameFlicker 1.65s ease-in-out infinite;
        display: inline-block;
        transform-origin: center bottom;
      }

      .subtitle {
        color: #ffd7b0;
        font-size: 1.05rem;
        margin: 8px auto 0;
        max-width: 560px;
      }

      .panel {
        backdrop-filter: blur(2px);
        background: linear-gradient(
          170deg,
          rgba(74, 30, 12, 0.7),
          rgba(32, 14, 8, 0.86)
        );
        border: 1px solid rgba(255, 159, 93, 0.22);
        border-radius: 22px;
        box-shadow:
          0 18px 38px rgba(0, 0, 0, 0.35),
          inset 0 1px 0 rgba(255, 189, 124, 0.25);
        margin-top: 16px;
        padding: 18px;
      }

      .controls-panel {
        display: grid;
        gap: 14px;
      }

      .slider-disclosure {
        background: rgba(255, 130, 41, 0.08);
        border: 1px solid rgba(255, 176, 97, 0.32);
        border-radius: 14px;
        padding: 10px 12px;
      }

      .slider-disclosure > summary {
        align-items: center;
        color: #ffe5c5;
        cursor: pointer;
        display: flex;
        font-size: 0.96rem;
        font-weight: 700;
        justify-content: space-between;
        letter-spacing: 0.02em;
        list-style: none;
      }

      .slider-disclosure > summary::-webkit-details-marker {
        display: none;
      }

      .slider-disclosure > summary::after {
        color: #ffcf93;
        content: "Expand";
        font-size: 0.8rem;
        text-transform: uppercase;
      }

      .slider-disclosure[open] > summary::after {
        content: "Collapse";
      }

      .slider-content {
        display: grid;
        gap: 12px;
        margin-top: 12px;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
      }

      button {
        background: linear-gradient(180deg, #ffb14d 0%, #ff7a24 60%, #e54f16 100%);
        border: none;
        border-radius: 12px;
        box-shadow:
          0 8px 16px rgba(240, 92, 20, 0.26),
          inset 0 1px 0 rgba(255, 235, 201, 0.5);
        color: #2b1306;
        cursor: pointer;
        font-family: "Barlow Semi Condensed", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        min-width: 150px;
        padding: 12px 18px;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          filter 0.18s ease;
      }

      button:hover {
        box-shadow:
          0 12px 20px rgba(245, 96, 18, 0.35),
          inset 0 1px 0 rgba(255, 245, 220, 0.56);
        filter: saturate(1.08);
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(1px);
      }

      .button-row .reset-btn {
        background: linear-gradient(180deg, #ffe4c6 0%, #ffc27f 60%, #f99d4f 100%);
      }

      .button-row .test-btn {
        background: linear-gradient(180deg, #ffd96d 0%, #ffb444 58%, #f1812d 100%);
      }

      .control-row {
        align-items: center;
        display: grid;
        gap: 12px;
        grid-template-columns: 132px minmax(120px, 1fr) auto;
      }

      .control-row label {
        color: #ffd9af;
        font-size: 0.95rem;
        font-weight: 700;
        text-align: right;
      }

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        background: linear-gradient(90deg, #ffb85f, #ff6220);
        border-radius: 999px;
        height: 8px;
        outline: none;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        background: #fff5dd;
        border: 2px solid #e95a20;
        border-radius: 50%;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.26);
        cursor: pointer;
        height: 20px;
        width: 20px;
      }

      input[type="range"]::-moz-range-thumb {
        background: #fff5dd;
        border: 2px solid #e95a20;
        border-radius: 50%;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.26);
        cursor: pointer;
        height: 20px;
        width: 20px;
      }

      input[type="range"]:disabled {
        filter: grayscale(0.6);
        opacity: 0.45;
      }

      .value-pill {
        background: rgba(255, 173, 92, 0.16);
        border: 1px solid rgba(255, 188, 122, 0.5);
        border-radius: 999px;
        color: #fff0d7;
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        min-width: 58px;
        padding: 4px 10px;
        text-align: center;
      }

      .toggle-row {
        align-items: center;
        color: #ffe1bf;
        display: inline-flex;
        font-weight: 600;
        gap: 8px;
        justify-content: center;
        width: 100%;
      }

      .toggle-row input[type="checkbox"] {
        accent-color: #ff8a2d;
        height: 16px;
        width: 16px;
      }

      #cameraControlStatus {
        color: #ffcfa1;
        font-size: 0.85rem;
        text-align: center;
      }

      .status-panel {
        display: grid;
        gap: 8px;
      }

      #status {
        background: linear-gradient(
          180deg,
          rgba(255, 169, 86, 0.26),
          rgba(255, 96, 24, 0.2)
        );
        border: 1px solid rgba(255, 173, 103, 0.45);
        border-radius: 12px;
        font-size: 1.05rem;
        font-weight: 700;
        margin: 0;
        padding: 10px;
        text-align: center;
      }

      #stats {
        color: #ffd7b8;
        font-size: 0.9rem;
        letter-spacing: 0.01em;
        text-align: center;
      }

      .video-panel {
        padding: 14px;
      }

      #container {
        border-radius: 18px;
        overflow: hidden;
        position: relative;
        width: 100%;
      }

      #container::after {
        border: 2px solid rgba(255, 165, 89, 0.42);
        border-radius: 18px;
        box-shadow:
          inset 0 0 18px rgba(255, 109, 35, 0.2),
          0 0 30px rgba(255, 95, 22, 0.24);
        content: "";
        inset: 0;
        pointer-events: none;
        position: absolute;
      }

      video {
        display: block;
        width: 100%;
      }

      canvas {
        left: 0;
        position: absolute;
        top: 0;
      }

      .reveal {
        animation: riseIn 0.6s ease-out forwards;
        animation-delay: var(--delay, 0ms);
        opacity: 0;
      }

      @keyframes riseIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes flameFlicker {
        0%,
        100% {
          transform: rotate(-3deg) scale(1);
        }

        50% {
          transform: rotate(4deg) scale(1.08);
        }
      }

      @keyframes emberDrift {
        0%,
        100% {
          transform: translate3d(0, 0, 0) scale(1);
        }

        50% {
          transform: translate3d(8px, -12px, 0) scale(1.06);
        }
      }

      @media (max-width: 760px) {
        body {
          padding: 14px 10px 22px;
        }

        .panel {
          border-radius: 16px;
          padding: 14px;
        }

        .control-row {
          grid-template-columns: 1fr auto;
        }

        .slider-disclosure > summary {
          font-size: 0.9rem;
        }

        .control-row label {
          grid-column: 1 / -1;
          text-align: left;
        }

        button {
          min-width: 132px;
          width: calc(50% - 6px);
        }

        .button-row button:last-child {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="bg-orb bg-orb--left"></div>
    <div class="bg-orb bg-orb--right"></div>

    <main class="app-shell">
      <header class="hero reveal" style="--delay: 0ms">
        <p class="badge">Fire-Type Vision</p>
        <h1><span class="spark">🔥</span> Charmander Star Detector</h1>
        <p class="subtitle">Track your target with ember-sharp recognition.</p>
      </header>

      <section class="panel controls-panel reveal" style="--delay: 90ms">
        <div class="button-row">
          <button onclick="startCamera()">Start Camera</button>
          <button onclick="startDetection()">Start Detection</button>
          <button class="test-btn" onclick="testAlertTone()">Test Beep</button>
          <button class="reset-btn" onclick="resetDetections()">Reset Detections</button>
        </div>

        <details class="slider-disclosure" open>
          <summary>Slider Controls</summary>
          <div class="slider-content">
            <div class="control-row">
              <label for="thresholdSlider">Match Threshold</label>
              <input
                id="thresholdSlider"
                type="range"
                min="0.55"
                max="0.95"
                step="0.01"
                value="0.78"
              />
              <span class="value-pill" id="thresholdValue">0.78</span>
            </div>

            <div class="control-row">
              <label for="zoomSlider">Zoom</label>
              <input
                id="zoomSlider"
                type="range"
                min="1"
                max="1"
                step="0.1"
                value="1"
                disabled
              />
              <span class="value-pill" id="zoomValue">N/A</span>
            </div>

            <div class="control-row">
              <label for="focusSlider">Manual Focus</label>
              <input
                id="focusSlider"
                type="range"
                min="0"
                max="1"
                step="0.01"
                value="0"
                disabled
              />
              <span class="value-pill" id="focusValue">N/A</span>
            </div>

            <label class="toggle-row">
              <input id="manualFocusToggle" type="checkbox" disabled />
              Enable manual focus
            </label>
            <div id="cameraControlStatus">Camera controls: unavailable</div>
          </div>
        </details>
      </section>

      <section class="panel status-panel reveal" style="--delay: 180ms">
        <div id="status">Status: Idle</div>
        <div id="stats">Frames scanned: 0 | Match score: 0.000 | Stable hits: 0/3</div>
      </section>

      <section class="panel video-panel reveal" style="--delay: 270ms">
        <div id="container">
          <video id="video" autoplay playsinline></video>
          <canvas id="overlay"></canvas>
        </div>
      </section>
    </main>

    <canvas id="frameCanvas" style="display: none"></canvas>

    <script>
      let roi = null;
      let drawing = false;
      let startX = 0;
      let startY = 0;

      let frameCount = 0;
      let threshold = 0.78;
      let stableMatchCount = 0;
      let previousCandidateMatch = null;

      let detections = [];
      let detectionLocked = false;
      let detectionTimer = null;
      let scanInProgress = false;
      let openCvReadyPromise = null;
      let alertAudioContext = null;
      let fallbackAlertAudio = null;
      let alertQueue = Promise.resolve();
      let activeVideoTrack = null;
      let zoomDebounceTimer = null;
      let focusDebounceTimer = null;

      let templateVariants = [];

      const TEMPLATE_SCALES = [0.8, 0.9, 1, 1.1, 1.2];
      const MIN_ROI_SIZE = 20;
      const SCAN_INTERVAL_MS = 150;
      const REQUIRED_STABLE_MATCHES = 3;
      const MATCH_POSITION_TOLERANCE_PX = 26;
      const MATCH_SIZE_TOLERANCE_RATIO = 0.2;

      const video = document.getElementById("video");
      const canvas = document.getElementById("overlay");
      const ctx = canvas.getContext("2d");

      const frameCanvas = document.getElementById("frameCanvas");
      const frameCtx = frameCanvas.getContext("2d");

      const statusDiv = document.getElementById("status");
      const statsDiv = document.getElementById("stats");
      const cameraControlStatusDiv = document.getElementById("cameraControlStatus");

      const slider = document.getElementById("thresholdSlider");
      const sliderValue = document.getElementById("thresholdValue");
      const zoomSlider = document.getElementById("zoomSlider");
      const zoomValue = document.getElementById("zoomValue");
      const manualFocusToggle = document.getElementById("manualFocusToggle");
      const focusSlider = document.getElementById("focusSlider");
      const focusValue = document.getElementById("focusValue");

      slider.oninput = () => {
        threshold = parseFloat(slider.value);
        sliderValue.innerText = threshold.toFixed(2);
      };

      zoomSlider.addEventListener("input", () => {
        zoomValue.innerText = parseFloat(zoomSlider.value).toFixed(2);
        scheduleZoomApply();
      });

      manualFocusToggle.addEventListener("change", () => {
        setManualFocus(manualFocusToggle.checked);
      });

      focusSlider.addEventListener("input", () => {
        focusValue.innerText = parseFloat(focusSlider.value).toFixed(2);
        scheduleFocusApply();
      });

      function waitForOpenCv(timeoutMs = 10000) {
        if (window.cv && typeof cv.Mat === "function") {
          return Promise.resolve();
        }

        if (!openCvReadyPromise) {
          openCvReadyPromise = new Promise((resolve, reject) => {
            const startedAt = Date.now();

            const check = () => {
              if (window.cv && typeof cv.Mat === "function") {
                resolve();
                return;
              }

              if (Date.now() - startedAt > timeoutMs) {
                reject(new Error("OpenCV failed to load."));
                return;
              }

              window.setTimeout(check, 50);
            };

            check();
          }).catch((error) => {
            openCvReadyPromise = null;
            throw error;
          });
        }

        return openCvReadyPromise;
      }

      function getAlertAudioContext() {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;

        if (!AudioContextClass) {
          return null;
        }

        if (!alertAudioContext || alertAudioContext.state === "closed") {
          alertAudioContext = new AudioContextClass();
        }

        return alertAudioContext;
      }

      function getFallbackAlertAudio() {
        if (!fallbackAlertAudio) {
          fallbackAlertAudio = new Audio(
            "https://actions.google.com/sounds/v1/alarms/beep_short.ogg",
          );
          fallbackAlertAudio.preload = "auto";
          fallbackAlertAudio.load();
        }

        return fallbackAlertAudio;
      }

      async function primeAlertAudio() {
        const context = getAlertAudioContext();

        if (context) {
          if (context.state === "suspended") {
            await context.resume();
          }

          const source = context.createBufferSource();
          const gain = context.createGain();

          source.buffer = context.createBuffer(1, 1, 22050);
          gain.gain.value = 0.0001;

          source.connect(gain);
          gain.connect(context.destination);

          source.start();
          source.stop(context.currentTime + 0.001);
          return;
        }

        const fallback = getFallbackAlertAudio();
        const wasMuted = fallback.muted;

        try {
          fallback.muted = true;
          await fallback.play();
          fallback.pause();
          fallback.currentTime = 0;
        } catch (error) {
          console.error(error);
        } finally {
          fallback.muted = wasMuted;
        }
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function getCanvasPoint(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        return {
          x: clamp(Math.round((clientX - rect.left) * scaleX), 0, canvas.width),
          y: clamp(
            Math.round((clientY - rect.top) * scaleY),
            0,
            canvas.height,
          ),
        };
      }

      function normalizeRect(x1, y1, x2, y2) {
        const left = clamp(Math.min(x1, x2), 0, canvas.width);
        const top = clamp(Math.min(y1, y2), 0, canvas.height);
        const right = clamp(Math.max(x1, x2), 0, canvas.width);
        const bottom = clamp(Math.max(y1, y2), 0, canvas.height);

        return {
          x: Math.round(left),
          y: Math.round(top),
          w: Math.round(right - left),
          h: Math.round(bottom - top),
        };
      }

      function clearCandidateState() {
        stableMatchCount = 0;
        previousCandidateMatch = null;
      }

      function isCandidateStable(candidate) {
        if (!previousCandidateMatch) {
          return true;
        }

        const dx = Math.abs(candidate.x - previousCandidateMatch.x);
        const dy = Math.abs(candidate.y - previousCandidateMatch.y);
        const dwRatio =
          Math.abs(candidate.w - previousCandidateMatch.w) /
          Math.max(1, previousCandidateMatch.w);
        const dhRatio =
          Math.abs(candidate.h - previousCandidateMatch.h) /
          Math.max(1, previousCandidateMatch.h);

        return (
          dx <= MATCH_POSITION_TOLERANCE_PX &&
          dy <= MATCH_POSITION_TOLERANCE_PX &&
          dwRatio <= MATCH_SIZE_TOLERANCE_RATIO &&
          dhRatio <= MATCH_SIZE_TOLERANCE_RATIO
        );
      }

      function getTrackCapabilities() {
        if (
          !activeVideoTrack ||
          typeof activeVideoTrack.getCapabilities !== "function"
        ) {
          return null;
        }

        try {
          return activeVideoTrack.getCapabilities();
        } catch (error) {
          console.error(error);
          return null;
        }
      }

      function getTrackSettings() {
        if (!activeVideoTrack || typeof activeVideoTrack.getSettings !== "function") {
          return {};
        }

        try {
          return activeVideoTrack.getSettings();
        } catch (error) {
          console.error(error);
          return {};
        }
      }

      function setCameraControlStatus(message) {
        cameraControlStatusDiv.innerText = message;
      }

      function disableCameraControls() {
        if (zoomDebounceTimer) {
          window.clearTimeout(zoomDebounceTimer);
          zoomDebounceTimer = null;
        }

        if (focusDebounceTimer) {
          window.clearTimeout(focusDebounceTimer);
          focusDebounceTimer = null;
        }

        zoomSlider.disabled = true;
        zoomSlider.value = "1";
        zoomValue.innerText = "N/A";

        manualFocusToggle.disabled = true;
        manualFocusToggle.checked = false;

        focusSlider.disabled = true;
        focusSlider.value = "0";
        focusValue.innerText = "N/A";
      }

      function configureZoomControl(capabilities, settings) {
        if (!capabilities || !capabilities.zoom) {
          zoomSlider.disabled = true;
          zoomValue.innerText = "N/A";
          return false;
        }

        const zoomRange = capabilities.zoom;
        const zoomStep = zoomRange.step && zoomRange.step > 0 ? zoomRange.step : 0.1;
        const currentZoom =
          typeof settings.zoom === "number" ? settings.zoom : zoomRange.min;
        const clampedZoom = clamp(currentZoom, zoomRange.min, zoomRange.max);

        zoomSlider.min = String(zoomRange.min);
        zoomSlider.max = String(zoomRange.max);
        zoomSlider.step = String(zoomStep);
        zoomSlider.value = String(clampedZoom);
        zoomSlider.disabled = false;
        zoomValue.innerText = clampedZoom.toFixed(2);
        return true;
      }

      function configureFocusControl(capabilities, settings) {
        const focusModes =
          capabilities && Array.isArray(capabilities.focusMode)
            ? capabilities.focusMode
            : [];

        if (!capabilities || !capabilities.focusDistance || !focusModes.includes("manual")) {
          manualFocusToggle.disabled = true;
          manualFocusToggle.checked = false;
          focusSlider.disabled = true;
          focusValue.innerText = "N/A";
          return false;
        }

        const focusRange = capabilities.focusDistance;
        const focusStep = focusRange.step && focusRange.step > 0 ? focusRange.step : 0.01;
        const currentFocus =
          typeof settings.focusDistance === "number"
            ? settings.focusDistance
            : focusRange.min;
        const clampedFocus = clamp(currentFocus, focusRange.min, focusRange.max);
        const isManual = settings.focusMode === "manual";

        manualFocusToggle.disabled = false;
        manualFocusToggle.checked = isManual;

        focusSlider.min = String(focusRange.min);
        focusSlider.max = String(focusRange.max);
        focusSlider.step = String(focusStep);
        focusSlider.value = String(clampedFocus);
        focusSlider.disabled = !isManual;
        focusValue.innerText = clampedFocus.toFixed(2);
        return true;
      }

      function getPreferredAutoFocusMode(focusModes) {
        if (!Array.isArray(focusModes)) {
          return null;
        }

        if (focusModes.includes("continuous")) {
          return "continuous";
        }

        if (focusModes.includes("single-shot")) {
          return "single-shot";
        }

        if (focusModes.includes("auto")) {
          return "auto";
        }

        return null;
      }

      async function applyTrackAdvancedConstraints(constraint) {
        if (
          !activeVideoTrack ||
          typeof activeVideoTrack.applyConstraints !== "function"
        ) {
          return false;
        }

        try {
          await activeVideoTrack.applyConstraints({ advanced: [constraint] });
          return true;
        } catch (error) {
          console.error(error);
          return false;
        }
      }

      function scheduleZoomApply() {
        if (zoomDebounceTimer) {
          window.clearTimeout(zoomDebounceTimer);
        }

        zoomDebounceTimer = window.setTimeout(async () => {
          zoomDebounceTimer = null;

          if (zoomSlider.disabled) {
            return;
          }

          const applied = await applyTrackAdvancedConstraints({
            zoom: parseFloat(zoomSlider.value),
          });

          if (!applied) {
            setCameraControlStatus("Camera controls: zoom update failed");
          }
        }, 80);
      }

      function scheduleFocusApply() {
        if (focusDebounceTimer) {
          window.clearTimeout(focusDebounceTimer);
        }

        focusDebounceTimer = window.setTimeout(async () => {
          focusDebounceTimer = null;

          if (focusSlider.disabled || !manualFocusToggle.checked) {
            return;
          }

          const applied = await applyTrackAdvancedConstraints({
            focusMode: "manual",
            focusDistance: parseFloat(focusSlider.value),
          });

          if (!applied) {
            setCameraControlStatus("Camera controls: focus update failed");
          }
        }, 80);
      }

      async function setManualFocus(enabled) {
        const capabilities = getTrackCapabilities();
        const focusModes =
          capabilities && Array.isArray(capabilities.focusMode)
            ? capabilities.focusMode
            : [];

        if (!capabilities || !capabilities.focusDistance || !focusModes.includes("manual")) {
          manualFocusToggle.checked = false;
          manualFocusToggle.disabled = true;
          focusSlider.disabled = true;
          setCameraControlStatus("Camera controls: manual focus unsupported");
          return;
        }

        if (enabled) {
          const applied = await applyTrackAdvancedConstraints({
            focusMode: "manual",
            focusDistance: parseFloat(focusSlider.value),
          });

          if (!applied) {
            manualFocusToggle.checked = false;
            focusSlider.disabled = true;
            setCameraControlStatus("Camera controls: failed to enable manual focus");
            return;
          }

          focusSlider.disabled = false;
          setCameraControlStatus("Camera controls: manual focus enabled");
          return;
        }

        const autoMode = getPreferredAutoFocusMode(focusModes);
        const applied = autoMode
          ? await applyTrackAdvancedConstraints({ focusMode: autoMode })
          : true;

        if (!applied) {
          manualFocusToggle.checked = true;
          focusSlider.disabled = false;
          setCameraControlStatus("Camera controls: failed to restore autofocus");
          return;
        }

        focusSlider.disabled = true;
        setCameraControlStatus("Camera controls: autofocus enabled");
      }

      function updateCameraControlsForTrack(track) {
        activeVideoTrack = track;

        if (!activeVideoTrack) {
          disableCameraControls();
          setCameraControlStatus("Camera controls: unavailable");
          return;
        }

        const capabilities = getTrackCapabilities();
        const settings = getTrackSettings();

        if (!capabilities) {
          disableCameraControls();
          setCameraControlStatus("Camera controls: capability data unavailable");
          return;
        }

        const zoomReady = configureZoomControl(capabilities, settings);
        const focusReady = configureFocusControl(capabilities, settings);

        if (zoomReady && focusReady) {
          setCameraControlStatus("Camera controls: zoom + manual focus available");
          return;
        }

        if (zoomReady) {
          setCameraControlStatus("Camera controls: zoom available");
          return;
        }

        if (focusReady) {
          setCameraControlStatus("Camera controls: manual focus available");
          return;
        }

        setCameraControlStatus("Camera controls: unavailable on this device");
      }

      function redrawOverlay() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (roi) {
          ctx.strokeStyle = "yellow";
          ctx.lineWidth = 3;
          ctx.strokeRect(roi.x, roi.y, roi.w, roi.h);
        }

        detections.forEach((detection) => {
          ctx.strokeStyle = "lime";
          ctx.lineWidth = 4;
          ctx.strokeRect(detection.x, detection.y, detection.w, detection.h);
        });
      }

      function drawSelectionPreview(x1, y1, x2, y2) {
        const preview = normalizeRect(x1, y1, x2, y2);

        redrawOverlay();

        ctx.strokeStyle = "yellow";
        ctx.lineWidth = 3;
        ctx.strokeRect(preview.x, preview.y, preview.w, preview.h);
      }

      function setRoiFromPoints(x1, y1, x2, y2) {
        const nextRoi = normalizeRect(x1, y1, x2, y2);

        if (nextRoi.w < MIN_ROI_SIZE || nextRoi.h < MIN_ROI_SIZE) {
          roi = null;
          detections = [];
          detectionLocked = false;
          clearCandidateState();
          statusDiv.innerText = "Status: Select a larger search area";
          redrawOverlay();
          return;
        }

        roi = nextRoi;
        detections = [];
        detectionLocked = false;
        clearCandidateState();
        statusDiv.innerText = "Status: Search area selected";
        redrawOverlay();
      }

      function getDefaultStatus() {
        if (detectionTimer !== null) {
          return detectionLocked
            ? "Status: Match Locked"
            : "Status: Detection Running";
        }

        if (roi) {
          return "Status: Search area selected";
        }

        return "Status: Idle";
      }

      function updateStats(score) {
        statsDiv.innerText =
          "Frames scanned: " +
          frameCount +
          " | Match score: " +
          score.toFixed(3) +
          " | Stable hits: " +
          stableMatchCount +
          "/" +
          REQUIRED_STABLE_MATCHES;
      }

      function clearTemplateVariants() {
        templateVariants.forEach((variant) => {
          variant.mat.delete();
        });

        templateVariants = [];
      }

      function clearDetectionLoop() {
        if (detectionTimer !== null) {
          window.clearInterval(detectionTimer);
          detectionTimer = null;
        }
      }

      function preprocessToGray(sourceMat, targetMat) {
        cv.cvtColor(sourceMat, targetMat, cv.COLOR_RGBA2GRAY);
        cv.equalizeHist(targetMat, targetMat);
        cv.GaussianBlur(targetMat, targetMat, new cv.Size(5, 5), 0);
      }

      function clampRoiToMat(sourceRoi, mat) {
        if (!sourceRoi || mat.cols === 0 || mat.rows === 0) {
          return null;
        }

        const x = clamp(sourceRoi.x, 0, Math.max(0, mat.cols - 1));
        const y = clamp(sourceRoi.y, 0, Math.max(0, mat.rows - 1));
        const w = Math.min(sourceRoi.w, mat.cols - x);
        const h = Math.min(sourceRoi.h, mat.rows - y);

        if (w < MIN_ROI_SIZE || h < MIN_ROI_SIZE) {
          return null;
        }

        return { x, y, w, h };
      }

      function createTemplateVariant(baseMat, scale) {
        const width = Math.max(1, Math.round(baseMat.cols * scale));
        const height = Math.max(1, Math.round(baseMat.rows * scale));

        if (width < MIN_ROI_SIZE || height < MIN_ROI_SIZE) {
          return null;
        }

        const variantMat = new cv.Mat();
        const interpolation = scale < 1 ? cv.INTER_AREA : cv.INTER_LINEAR;

        cv.resize(
          baseMat,
          variantMat,
          new cv.Size(width, height),
          0,
          0,
          interpolation,
        );

        return { scale, mat: variantMat };
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = () =>
            reject(new Error("Template image could not be loaded."));
          img.src = src;
        });
      }

      async function loadTemplateVariants(src) {
        clearTemplateVariants();

        const img = await loadImage(src);
        const rawTemplate = cv.imread(img);
        const processedTemplate = new cv.Mat();

        try {
          preprocessToGray(rawTemplate, processedTemplate);

          TEMPLATE_SCALES.forEach((scale) => {
            const variant = createTemplateVariant(processedTemplate, scale);

            if (variant) {
              templateVariants.push(variant);
            }
          });
        } finally {
          rawTemplate.delete();
          processedTemplate.delete();
        }

        if (templateVariants.length === 0) {
          throw new Error("Template sizes are invalid for matching.");
        }
      }

      function findBestMatch(searchMat) {
        let bestMatch = null;

        templateVariants.forEach((variant) => {
          if (
            searchMat.cols < variant.mat.cols ||
            searchMat.rows < variant.mat.rows
          ) {
            return;
          }

          const result = new cv.Mat();

          try {
            cv.matchTemplate(searchMat, variant.mat, result, cv.TM_CCOEFF_NORMED);

            const { maxVal, maxLoc } = cv.minMaxLoc(result);

            if (!bestMatch || maxVal > bestMatch.score) {
              bestMatch = {
                score: maxVal,
                x: maxLoc.x,
                y: maxLoc.y,
                w: variant.mat.cols,
                h: variant.mat.rows,
                scale: variant.scale,
              };
            }
          } finally {
            result.delete();
          }
        });

        return bestMatch;
      }

      async function startCamera() {
        try {
          await primeAlertAudio().catch(() => {});

          if (video.srcObject) {
            video.srcObject.getTracks().forEach((track) => track.stop());
          }

          updateCameraControlsForTrack(null);

          statusDiv.innerText = "Status: Starting camera";

          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
          });

          video.srcObject = stream;
          const [track] = stream.getVideoTracks();
          updateCameraControlsForTrack(track || null);

          video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            frameCanvas.width = video.videoWidth;
            frameCanvas.height = video.videoHeight;

            statusDiv.innerText = "Status: Camera ready";
            redrawOverlay();
          };
        } catch (error) {
          statusDiv.innerText = "Status: Camera access failed";
          console.error(error);
        }
      }

      canvas.addEventListener("mousedown", startDraw);
      canvas.addEventListener("mousemove", drawBox);
      canvas.addEventListener("mouseup", endDraw);

      canvas.addEventListener("touchstart", startTouch);
      canvas.addEventListener("touchmove", moveTouch);
      canvas.addEventListener("touchend", endTouch);

      function startDraw(e) {
        if (!canvas.width || !canvas.height) return;

        primeAlertAudio().catch(() => {});

        const point = getCanvasPoint(e.clientX, e.clientY);

        drawing = true;
        startX = point.x;
        startY = point.y;
      }

      function drawBox(e) {
        if (!drawing) return;

        const point = getCanvasPoint(e.clientX, e.clientY);
        drawSelectionPreview(startX, startY, point.x, point.y);
      }

      function endDraw(e) {
        if (!drawing) return;

        const point = getCanvasPoint(e.clientX, e.clientY);

        drawing = false;
        setRoiFromPoints(startX, startY, point.x, point.y);
      }

      function startTouch(e) {
        e.preventDefault();

        if (!canvas.width || !canvas.height) return;

        primeAlertAudio().catch(() => {});

        const point = getCanvasPoint(
          e.touches[0].clientX,
          e.touches[0].clientY,
        );

        startX = point.x;
        startY = point.y;

        drawing = true;
      }

      function moveTouch(e) {
        if (!drawing) return;

        e.preventDefault();

        const point = getCanvasPoint(
          e.touches[0].clientX,
          e.touches[0].clientY,
        );

        drawSelectionPreview(startX, startY, point.x, point.y);
      }

      function endTouch(e) {
        if (!drawing) return;

        const point = getCanvasPoint(
          e.changedTouches[0].clientX,
          e.changedTouches[0].clientY,
        );

        drawing = false;
        setRoiFromPoints(startX, startY, point.x, point.y);
      }

      async function startDetection() {
        await primeAlertAudio().catch(() => {});

        if (!video.srcObject || video.readyState < HTMLMediaElement.HAVE_CURRENT_DATA) {
          statusDiv.innerText = "Status: Start the camera first";
          return;
        }

        if (!roi) {
          statusDiv.innerText = "Status: Draw a search area first";
          return;
        }

        clearDetectionLoop();
        detections = [];
        detectionLocked = false;
        clearCandidateState();
        frameCount = 0;
        updateStats(0);
        redrawOverlay();

        try {
          statusDiv.innerText = "Status: Loading OpenCV";
          await waitForOpenCv();

          statusDiv.innerText = "Status: Loading template";
          await loadTemplateVariants("star.png");

          statusDiv.innerText = "Status: Detection Running";
          detectionTimer = window.setInterval(detectFrame, SCAN_INTERVAL_MS);
        } catch (error) {
          statusDiv.innerText = "Status: Detection could not start";
          console.error(error);
        }
      }

      function detectFrame() {
        if (scanInProgress || !roi || templateVariants.length === 0) {
          return;
        }

        if (!frameCanvas.width || !frameCanvas.height) {
          statusDiv.innerText = "Status: Camera frame unavailable";
          return;
        }

        scanInProgress = true;

        let src = null;
        let processed = null;
        let roiMat = null;

        try {
          frameCtx.drawImage(
            video,
            0,
            0,
            frameCanvas.width,
            frameCanvas.height,
          );

          src = cv.imread(frameCanvas);
          processed = new cv.Mat();

          preprocessToGray(src, processed);

          const safeRoi = clampRoiToMat(roi, processed);

          if (!safeRoi) {
            statusDiv.innerText = "Status: Search area is too small";
            clearCandidateState();
            updateStats(0);
            redrawOverlay();
            return;
          }

          roiMat = processed.roi(
            new cv.Rect(safeRoi.x, safeRoi.y, safeRoi.w, safeRoi.h),
          );

          const bestMatch = findBestMatch(roiMat);

          frameCount += 1;
          updateStats(bestMatch ? bestMatch.score : 0);

          if (!bestMatch) {
            statusDiv.innerText = "Status: Search area is smaller than template";
            clearCandidateState();
            redrawOverlay();
            return;
          }

          if (bestMatch.score >= threshold && !detectionLocked) {
            const candidate = {
              x: safeRoi.x + bestMatch.x,
              y: safeRoi.y + bestMatch.y,
              w: bestMatch.w,
              h: bestMatch.h,
            };

            if (isCandidateStable(candidate)) {
              stableMatchCount += 1;
            } else {
              stableMatchCount = 1;
            }

            previousCandidateMatch = candidate;
            detections = [candidate];

            if (stableMatchCount < REQUIRED_STABLE_MATCHES) {
              statusDiv.innerText =
                "Status: Candidate match " +
                stableMatchCount +
                "/" +
                REQUIRED_STABLE_MATCHES +
                " (" +
                bestMatch.score.toFixed(3) +
                ")";
              redrawOverlay();
              return;
            }

            detectionLocked = true;
            statusDiv.innerText =
              "Status: Match Found (" + bestMatch.score.toFixed(3) + ")";
            redrawOverlay();
            alertUser();
            return;
          }

          if (!detectionLocked) {
            clearCandidateState();
          }

          statusDiv.innerText = getDefaultStatus();
          redrawOverlay();
        } catch (error) {
          statusDiv.innerText = "Status: Detection error";
          clearDetectionLoop();
          console.error(error);
        } finally {
          if (roiMat) {
            roiMat.delete();
          }

          if (processed) {
            processed.delete();
          }

          if (src) {
            src.delete();
          }

          scanInProgress = false;
        }
      }

      async function playAlertTone() {
        const context = getAlertAudioContext();

        if (!context) {
          throw new Error("Web Audio is unavailable.");
        }

        if (context.state === "suspended") {
          await context.resume();
        }

        const startAt = context.currentTime + 0.01;
        const pulses = [
          { frequency: 1320, offset: 0, duration: 0.1 },
          { frequency: 1320, offset: 0.16, duration: 0.1 },
          { frequency: 1568, offset: 0.32, duration: 0.1 },
          { frequency: 1568, offset: 0.48, duration: 0.14 },
        ];
        const sequenceDurationSeconds = Math.max(
          ...pulses.map((pulse) => pulse.offset + pulse.duration),
        );

        pulses.forEach((pulse) => {
          const oscillator = context.createOscillator();
          const gain = context.createGain();
          const pulseStart = startAt + pulse.offset;
          const pulseEnd = pulseStart + pulse.duration;

          oscillator.type = "square";
          oscillator.frequency.setValueAtTime(pulse.frequency, pulseStart);

          gain.gain.setValueAtTime(0.0001, pulseStart);
          gain.gain.exponentialRampToValueAtTime(0.42, pulseStart + 0.008);
          gain.gain.exponentialRampToValueAtTime(0.0001, pulseEnd);

          oscillator.connect(gain);
          gain.connect(context.destination);

          oscillator.start(pulseStart);
          oscillator.stop(pulseEnd);
        });

        await new Promise((resolve) => {
          window.setTimeout(resolve, Math.ceil((sequenceDurationSeconds + 0.04) * 1000));
        });
      }

      async function playFallbackAlertTone() {
        const audio = getFallbackAlertAudio();

        audio.pause();
        audio.currentTime = 0;

        await audio.play();
        await new Promise((resolve) => {
          let finished = false;
          let timeoutId = null;

          const done = () => {
            if (finished) {
              return;
            }

            finished = true;
            window.clearTimeout(timeoutId);
            audio.removeEventListener("ended", done);
            resolve();
          };

          timeoutId = window.setTimeout(done, 900);
          audio.addEventListener("ended", done);
        });
      }

      async function alertUser(options = {}) {
        const vibrateEnabled = options.vibrate !== false;

        const runAlert = async () => {
          try {
            await playAlertTone();
          } catch (error) {
            try {
              await playFallbackAlertTone();
            } catch (fallbackError) {
              console.error(fallbackError);
            }
          }

          if (vibrateEnabled && navigator.vibrate) {
            navigator.vibrate([300, 200, 300]);
          }
        };

        alertQueue = alertQueue.then(runAlert, runAlert);
        await alertQueue;
      }

      async function testAlertTone() {
        await primeAlertAudio().catch(() => {});
        statusDiv.innerText = "Status: Testing alert";
        await alertUser({ vibrate: false });
        statusDiv.innerText = getDefaultStatus();
      }

      function resetDetections() {
        detections = [];
        detectionLocked = false;
        clearCandidateState();
        frameCount = 0;
        updateStats(0);
        statusDiv.innerText = getDefaultStatus();
        redrawOverlay();
      }
    </script>
  </body>
</html>
